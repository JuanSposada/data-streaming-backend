services:
  backend:
    build: .
    container_name: streaming-server
    ports:
      - "50051:50051"
    volumes:
      - ./uploads:/root/uploads
    depends_on:
      - redis
      - nats
    environment:
      - REDIS_ADDR=redis:6379
      - NATS_ADDR=nats:4222

  redis:
    image: redis:7-alpine
    container_name: streaming-redis
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    container_name: streaming-nats
    ports:
      - "4222:4222"
    command: ["-js"]

  api:
    build: ./python-api
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/uploads
    depends_on:
      - backend   # 👈 FIX
      - redis
    environment:
      - GRPC_HOST=backend:50051   # 👈 FIX
      - REDIS_HOST=redis