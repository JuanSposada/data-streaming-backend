<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STAS - Transferencia de Archivos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .section {
      border-bottom: 1px solid #374151;
      padding-bottom: 25px;
      margin-bottom: 25px;
    }

    .section:last-child {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }

    h1, h2 {
      margin-bottom: 20px;
      color: #f3f4f6;
    }

    h2 {
      font-size: 1.25rem;
    }

    input[type="text"], input[type="file"] {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 16px;
      background: #374151;
      color: white;
      box-sizing: border-box;
    }

    input[type="file"] {
      cursor: pointer;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .btn-primary { background: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; }

    .btn-warning { background: #f59e0b; }
    .btn-warning:hover { background: #d97706; }

    .btn-success { background: #22c55e; }
    .btn-success:hover { background: #16a34a; }

    .status-text {
      margin-top: 10px;
      font-size: 14px;
      min-height: 20px;
    }

    .progress-container {
      margin-top: 15px;
      width: 100%;
      height: 20px;
      background: #374151;
      border-radius: 8px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      transition: width 0.1s ease-in-out;
    }
    
    #progressBar { background: #2563eb; }
    #uploadBar { background: #22c55e; }
  </style>
</head>

<body>

  <div class="container">
    
    <div class="section">
      <h2>⬇️ Streaming Downloader</h2>
      <input type="text" id="fileId" value="9meses.mp4" placeholder="Nombre del archivo a descargar" />
      
      <div class="buttons">
        <button class="btn-primary" onclick="downloadFile()">Descargar</button>
        <button class="btn-warning" onclick="pauseDownload()">Pausar</button>
        <button class="btn-success" onclick="resumeDownload()">Reanudar</button>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p id="status" class="status-text"></p>
    </div>

    <div class="section">
      <h2>⬆️ Streaming Uploader (STAS)</h2>
      <input type="file" id="file_input" />
      
      <div class="buttons">
        <button class="btn-primary" onclick="uploadLargeFile()">Subir</button>
        <button class="btn-warning" onclick="pauseUpload()">Pausar</button>
        <button class="btn-success" onclick="resumeUpload()">Reanudar</button>
      </div>

      <div class="progress-container">
        <div class="progress-bar" id="uploadBar"></div>
      </div>
      <p id="upload-status" class="status-text">Esperando archivo...</p>
    </div>

  </div>

<script>
// --- CONTROL DE GLOBAL DESCARGA ---
let controller = null;
let downloadedChunks = 0;
let totalChunks = 1;
let currentBlobParts = [];
let isDownloading = false;

// --- CONTROL DE GLOBAL SUBIDA ---
let currentUploadIndex = 0;
let isUploading = false;
let uploadPaused = false;

// --- LÓGICA DE DESCARGA ---
async function getFileInfo(fileId) {
  const response = await fetch(`http://localhost:8080/api/v1/files/${fileId}/info`);
  return await response.json();
}

async function downloadFile() {
  const fileId = document.getElementById("fileId").value;
  const status = document.getElementById("status");

  if (isDownloading) return;
  isDownloading = true;

  try {
    status.innerHTML = "⏳ Descargando...";
    
    if (downloadedChunks === 0){
       const info = await getFileInfo(fileId);
       totalChunks = info.total_chunks || 1;
    }
     
    controller = new AbortController();

    const response = await fetch(
      `http://localhost:8080/api/v1/files/${fileId}?start_chunk=${downloadedChunks}`,
      { signal: controller.signal }
    );

    if (!response.ok) throw new Error("Error descargando");

    const reader = response.body.getReader();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      currentBlobParts.push(value);
      downloadedChunks++;

      const percent = (downloadedChunks / totalChunks) * 100;
      document.getElementById("progressBar").style.width = percent + "%";
      status.innerHTML = `📦 Descargando: ${percent.toFixed(2)}%`;
    }

    if (downloadedChunks >= totalChunks){
      const blob = new Blob(currentBlobParts);
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileId;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(url);

      status.innerHTML = "✅ Descarga completada";
      downloadedChunks = 0;
      currentBlobParts = [];
    }

  } catch (err) {
    if (err.name === "AbortError") {
      status.innerHTML = "⏸️ Descarga pausada";
    } else {
      console.error(err);
      status.innerHTML = "❌ Error descargando";
    }
  } finally {
    isDownloading = false;
  }
}

async function pauseDownload() {
  const fileId = document.getElementById("fileId").value;
  if (controller) controller.abort();
  await fetch(`http://localhost:8080/api/v1/files/${fileId}/pause`, { method: "POST" });
}

async function resumeDownload() {
  const fileId = document.getElementById("fileId").value;
  await fetch(`http://localhost:8080/api/v1/files/${fileId}/resume`, { method: "POST" });
  document.getElementById("status").innerHTML = "▶️ Reanudando...";
  downloadFile();
}

// --- LÓGICA DE SUBIDA (UPLOAD) ---
async function uploadLargeFile() {
  const fileInput = document.getElementById("file_input");
  const status = document.getElementById("upload-status");
  const uploadBar = document.getElementById("uploadBar");

  if (!fileInput.files[0]) {
    status.innerHTML = "❌ Selecciona un archivo primero";
    return;
  }

  if (isUploading) return;
  isUploading = true;
  uploadPaused = false;

  const file = fileInput.files[0];
  const chunkSize = 1024 * 1024; // Bloques de 1 MB
  const totalUploadChunks = Math.ceil(file.size / chunkSize);

  status.innerHTML = "⏳ Iniciando subida...";

  // Continuamos desde donde se quedó (0 si es nueva, o el índice guardado si fue pausado)
  for (let i = currentUploadIndex; i < totalUploadChunks; i++) {
    if (uploadPaused) {
      status.innerHTML = "⏸️ Subida pausada en el servidor";
      isUploading = false;
      return;
    }

    currentUploadIndex = i; // Guardamos el progreso por si pausa en el siguiente ciclo
    const start = i * chunkSize;
    const end = Math.min(file.size, start + chunkSize);
    const chunk = file.slice(start, end);
    
    const formData = new FormData();
    formData.append("file", chunk, file.name);
    formData.append("chunk_index", i);
    formData.append("total_chunks", totalUploadChunks);

    try {
      const response = await fetch("http://localhost:8080/api/v1/files/upload", {
        method: "POST",
        body: formData
      });

      if (!response.ok) throw new Error("Error en el servidor");

      const percent = ((i + 1) / totalUploadChunks) * 100;
      uploadBar.style.width = percent + "%";
      status.innerHTML = `📤 Subiendo: ${percent.toFixed(2)}% (Chunk ${i+1}/${totalUploadChunks})`;

    } catch (err) {
      console.error(err);
      status.innerHTML = "❌ Error subiendo el archivo";
      isUploading = false;
      return;
    }
  }

  status.innerHTML = "✅ ¡Subida completada con éxito!";
  isUploading = false;
  currentUploadIndex = 0; // Reseteamos contador
}

async function pauseUpload() {
  const fileInput = document.getElementById("file_input");
  if (!fileInput.files[0]) return;
  
  const fileId = fileInput.files[0].name;
  uploadPaused = true;

  // Notificamos a Redis a través de Python para cambiar el estado a PAUSED
  await fetch(`http://localhost:8080/api/v1/files/${fileId}/pause`, { method: "POST" });
}

async function resumeUpload() {
  const fileInput = document.getElementById("file_input");
  if (!fileInput.files[0]) return;

  const fileId = fileInput.files[0].name;
  
  // Despertamos el estado en Redis a RUNNING
  await fetch(`http://localhost:8080/api/v1/files/${fileId}/resume`, { method: "POST" });
  document.getElementById("upload-status").innerHTML = "▶️ Reanudando subida...";
  
  // Volvemos a disparar el loop de carga
  uploadLargeFile();
}
</script>

</body>
</html>
